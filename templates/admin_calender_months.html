<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Overview | Ayris's Plumbing Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #0f1115; color: #e8e8e8; margin: 0; padding: 30px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.5rem; margin: 0; }
        a.back-link { color: #b5651d; text-decoration: none; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; background: #1a1d24; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #2a2d35; font-size: 0.92rem; }
        th { background: #20232b; text-transform: uppercase; font-size: 0.78rem; letter-spacing: 0.5px; color: #aaa; }
        tr.month-row { cursor: pointer; }
        tr.month-row:hover { background: #20232b; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="top-row">
        <h1>Monthly Overview</h1>
        <a class="back-link" href="{{ url_for('admin_dashboard') }}">Back to Appointments</a>
    </div>

    {% if months %}
    <table>
        <thead>
            <tr><th>Month</th><th>Total Appointments</th></tr>
        </thead>
        <tbody>
            {% for m in months %}
            <tr class="month-row" data-href="{{ url_for('admin_calendar_month', month=m['month']) }}">
                <td>{{ m['month'] }}</td>
                <td>{{ m['count'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <div class="empty-state">No appointments yet.</div>
    {% endif %}

    <script>
    document.querySelectorAll('tr[data-href]').forEach(function(row) {
        row.addEventListener('click', function() {
            window.location.href = row.getAttribute('data-href');
        });
    });
    </script>
</body>
</html>
